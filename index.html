<!DOCTYPE html>
<html>
<head>
  <title>My Calculator Hub</title>

  <style>
    body {
     
      
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4CAF50, #2E8B57);
      margin: 0;
      color: white;
      text-align: center;
    }

    .header {
      padding: 30px;
      font-size: 28px;
      font-weight: bold;
    }

    .logo {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .container {
      background: white;
      color: black;
      margin: 30px auto;
      padding: 30px;
      width: 80%;
      max-width: 600px;
      border-radius: 15px;
      box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
    }

    .card {
      background: #f4f4f4;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      background: #e0e0e0;
      transform: scale(1.05);
    }

    a {
      text-decoration: none;
      color: #4CAF50;
      font-weight: bold;
      font-size: 18px;
    }

  </style>
</head>

<body>

<div class="header">
  <div class="logo">🕒 ➕ 🧮</div>
  My Calculator Hub
</div>

<div class="container">

  <h2>Free Tools</h2>

  <div class="card">
    <a href="age-calculator.html">Age Calculator</a>
  </div>

</div>

</body>
</html>
