<!DOCTYPE html>
<html>
<head>
<title>Savings Calculator</title>
  <meta name="description" content="Free savings calculator.">

<meta name="keywords" content="savings calculator, calculate savings, savings calculator">
<style>
body{font-family:Arial;background:linear-gradient(to right,#4CAF50,#2E8B57);margin:0;text-align:center;color:white;}
.header{padding:25px;font-size:28px;font-weight:bold;}
.container{background:white;color:black;margin:30px auto;padding:30px;width:90%;max-width:500px;border-radius:15px;}
input,button{padding:10px;margin:10px;width:80%;}
button{background:#4CAF50;color:white;border:none;}
.result{font-size:20px;font-weight:bold;}
</style>
</head>
<body>

<div class="header">🕒 ➕ 🧮 My Calculator Hub</div>

<div class="container">
<h2>Savings Calculator</h2>

<input id="amount" placeholder="Amount">
<input id="rate" placeholder="Interest %">

<button onclick="calcSave()">Calculate</button>

<p id="result" class="result"></p>
<a href="index.html">⬅ Back</a>
</div>

<script>
function calcSave(){
let a=parseFloat(amount.value);
let r=parseFloat(rate.value);

if(!a||!r){result.innerText="Enter values";return;}

result.innerText="After 1 year: $"+(a*(1+r/100)).toFixed(2);
}
</script>

</body>
</html>
