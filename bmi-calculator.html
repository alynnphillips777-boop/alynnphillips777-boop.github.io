<!DOCTYPE html>
<html>
<head>
<title>BMI Calculator</title>

<style>

  
  body {font-family: Arial; background:#f4f6f8; text-align:center;}
.container {padding:40px;}
input, button {padding:10px; margin:10px;}
button {background:#4CAF50; color:white; border:none;}
</style>
</head>

<body>

<div class="container">
<h1>BMI Calculator</h1>

<p>Enter your weight (lbs) and height (inches)</p>

<input id="weight" placeholder="Weight">
<input id="height" placeholder="Height">
<br>
<button onclick="calcBMI()">Calculate</button>

<p id="result"></p>

<a href="index.html">⬅ Back</a>
</div>

<script>
function calcBMI(){
let w = document.getElementById("weight").value;
let h = document.getElementById("height").value;

let bmi = (w / (h*h)) * 703;

document.getElementById("result").innerText = "BMI: " + bmi.toFixed(1);
}
</script>

</body>
</html>
