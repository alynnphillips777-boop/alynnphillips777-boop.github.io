<!DOCTYPE html>
<html>
<head>
<title>Loan Calculator</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  text-align: center;
}

.container {
  padding: 40px;
}

input, button {
  padding: 10px;
  margin: 10px;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
}
</style>

</head>


  
  <body>

<div class="container">

<h1>Loan Calculator</h1>

<p>Enter loan details:</p>

<input id="amount" placeholder="Loan Amount">
<input id="rate" placeholder="Interest Rate (%)">
<input id="years" placeholder="Years">

<br>
<button onclick="calcLoan()">Calculate</button>

<p id="result"></p>

<a href="index.html">⬅ Back</a>

</div>

<script>
function calcLoan(){
alert("Button works");

let amount = document.getElementById("amount").value;
let rate = document.getElementById("rate").value;
let years = document.getElementById("years").value;

document.getElementById("result").innerText =
"Values: " + amount + ", " + rate + ", " + years;
}
</script>
</script>

</body>
</html>
