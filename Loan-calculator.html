<!DOCTYPE html>
<html>
<head>
<title>Loan Calculator</title>
</head>

<body style="text-align:center; font-family:Arial;">


 
 <h1>Loan Calculator</h1>

 <input id="amount" placeholder="Loan Amount">
<input id="rate" placeholder="Interest %">
<input id="years" placeholder="Years">

<br><br>
<button onclick="calcLoan()">Calculate</button>

<p id="result"></p>

<a href="index.html">⬅ Back</a>

<script>
function calcLoan(){
let a = document.getElementById("amount").value;
let r = document.getElementById("rate").value/100/12;
let n = document.getElementById("years").value*12;

let m = (a*r)/(1-Math.pow(1+r,-n));

document.getElementById("result").innerText = "Monthly: $" + m.toFixed(2);
}
</script>

</body>
</html>
