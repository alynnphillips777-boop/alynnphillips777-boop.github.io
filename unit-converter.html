<style>
body{font-family:Arial;background:linear-gradient(to right,#4CAF50,#2E8B57);margin:0;text-align:center;color:white;}
.header{padding:25px;font-size:28px;font-weight:bold;}

<body>

<div class="header">🕒 ➕ 🧮 My Calculator Hub</div>

<div class="container">
<h2>Unit Converter (Inches to Feet)</h2>

<input id="inches" placeholder="Inches">

<button onclick="convert()">Convert</button>

<p id="result" class="result"></p>
<a href="index.html">⬅ Back</a>
</div>

<script>
function convert(){
let i=parseFloat(inches.value);

if(!i){result.innerText="Enter value";return;}

result.innerText=(i/12).toFixed(2)+" feet";
}
</script>

</body>
